name: HDN - Build SkyrimPlatform.dll

# Builds the official SkyrimPlatform.dll bundle for the Hijos de las Nieves
# server, locked to the same commit that the server is built from. The output
# zip is published as a GitHub release asset that the master backend exposes
# via /api/skyrim-platform/latest, and that the launcher installs into the
# user's Skyrim Special Edition tree.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. sp-2026.04.19)"
        required: true
        default: "sp-dev"
  push:
    tags:
      - "sp-*"

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-skyrim-platform:
    runs-on: windows-2022
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup Yarn cache
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            ~/AppData/Local/Yarn/Cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}

      - name: Install yarn deps for skymp5-client (needed by cmake)
        shell: pwsh
        run: |
          cd skymp5-client
          yarn --frozen-lockfile
          yarn build

      - name: Move vcpkg to C:/vcpkg
        shell: pwsh
        run: |
          if (Test-Path C:/vcpkg) { Remove-Item -Recurse -Force C:/vcpkg }
          Move-Item -Path .\vcpkg -Destination C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat

      - name: Setup NuGet credentials for vcpkg binary cache
        shell: pwsh
        run: |
          $nuget = & C:/vcpkg/vcpkg.exe fetch nuget | Select-Object -Last 1
          & $nuget sources add `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            -StorePasswordInClearText `
            -Name "GitHub" `
            -Username "${{ github.repository_owner }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}"
          & $nuget setapikey "${{ secrets.GITHUB_TOKEN }}" `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      # HDN 2026-04-22 [build-speedup]: cache del árbol vcpkg_installed entre
      # runs. El fingerprint es el hash de vcpkg.json + vcpkg-configuration.json;
      # mientras no cambien las deps, reusamos 100% (ahorra ~15-20 min de
      # compilación de CEF, MongoDB C driver, spdlog, simdjson…).
      # restore-keys permite usar el cache aunque el fingerprint haya cambiado
      # (MSBuild se encargará de recompilar lo que haga falta).
      - name: Cache vcpkg_installed
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            build/vcpkg_installed
          key: sp-vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', '**/vcpkg.json') }}
          restore-keys: |
            sp-vcpkg-${{ runner.os }}-

      # HDN 2026-04-22 [build-speedup]: cache del árbol de build MSBuild.
      # Key por SHA para hits perfectos en reruns, restore-keys en cascada
      # para reusar el tree de commits anteriores y hacer build incremental.
      # Esperado: un cambio sólo en un .cpp = recompila ese obj y linka,
      # no recompila 500 archivos (~5-10 min de ahorro).
      - name: Cache build tree (MSBuild incremental)
        id: cache-buildtree
        uses: actions/cache@v4
        with:
          path: |
            build/CMakeFiles
            build/CMakeCache.txt
            build/_deps
            build/skyrim-platform
            build/skymp5-server
            build/skymp5-client
            build/skymp5-functions-lib
          key: sp-buildtree-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            sp-buildtree-${{ runner.os }}-${{ github.ref_name }}-
            sp-buildtree-${{ runner.os }}-main-
            sp-buildtree-${{ runner.os }}-

      - name: Configure CMake (Visual Studio 17 2022)
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DVCPKG_ROOT=C:/vcpkg `
            -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
            -DUNIT_DATA_DIR=skyrim_data_files `
            -DDOWNLOAD_SKYRIM_DATA=ON `
            -DBUILD_NODEJS=OFF `
            -DSKYRIM_VR=OFF

      - name: Build skyrim-platform target (custom yarn pack)
        shell: pwsh
        run: |
          # HDN 2026-04-22 [build-speedup]: paralelismo MSBuild. El runner
          # windows-2022 tiene 4 vCPU. /m:4 + /nr:false evita daemons que
          # bloquean el cache upload posterior.
          cmake --build build --config Release --target skyrim-platform `
            --parallel 4 `
            -- /m:4 /nr:false

      - name: Verify SkyrimPlatform.dll exists
        shell: pwsh
        run: |
          $dll = "build/dist/client/Data/SKSE/Plugins/SkyrimPlatform.dll"
          if (-not (Test-Path $dll)) {
            Write-Error "SkyrimPlatform.dll not found at $dll"
            Get-ChildItem -Recurse build/dist/client/Data | Select-Object -First 50 | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          Write-Host "OK: $((Get-Item $dll).Length) bytes"

      - name: Compute build metadata
        id: meta
        shell: pwsh
        run: |
          $sha = (git rev-parse HEAD).Substring(0,12)
          $iso = (Get-Date -Format "yyyyMMdd-HHmmss")
          $ver = "$iso-$sha"
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "sha=$sha" >> $env:GITHUB_OUTPUT
          echo "ts=$iso" >> $env:GITHUB_OUTPUT
          Write-Host "version=$ver"

      - name: Package SkyrimPlatform bundle
        shell: pwsh
        run: |
          $ver = "${{ steps.meta.outputs.version }}"
          $stage = "package/SkyrimPlatform-$ver"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          # Copy the entire client tree produced by the dev_service packer.
          # It contains Data/SKSE/Plugins/* and Data/Platform/* with all
          # CEF, libnode and runtime deps in the correct layout.
          Copy-Item -Recurse -Force build/dist/client/Data $stage/Data

          # Drop the master/server URL config so the .dll knows where to phone
          # home. The launcher will overwrite it per-environment.
          $config = @{
            master = "https://master.hijosdelasnieves.es"
            serverHost = "play.hijosdelasnieves.es"
            serverPort = 7777
            buildVersion = "$ver"
            commit = "${{ steps.meta.outputs.sha }}"
            buildTimestamp = "${{ steps.meta.outputs.ts }}"
          } | ConvertTo-Json -Depth 5
          $config | Out-File -Encoding utf8 -FilePath "$stage/Data/Platform/hdn-build.json"

          # Zip the package
          $zip = "SkyrimPlatform-$ver.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -CompressionLevel Optimal

          # SHA256
          $hash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLower()
          $size = (Get-Item $zip).Length

          # Manifest for the master backend
          $manifest = @{
            version = "$ver"
            commit = "${{ steps.meta.outputs.sha }}"
            timestamp = "${{ steps.meta.outputs.ts }}"
            sha256 = $hash
            size = $size
            file = $zip
          } | ConvertTo-Json -Depth 5
          $manifest | Out-File -Encoding utf8 -FilePath "skyrim-platform-latest.json"

          echo "zip=$zip" >> $env:GITHUB_OUTPUT
          echo "sha256=$hash" >> $env:GITHUB_OUTPUT
          echo "size=$size" >> $env:GITHUB_OUTPUT
        id: pack

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: skyrim-platform-${{ steps.meta.outputs.version }}
          path: |
            SkyrimPlatform-*.zip
            skyrim-platform-latest.json
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/sp-') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: SkyrimPlatform ${{ steps.meta.outputs.version }}
          body: |
            Build oficial de SkyrimPlatform.dll para Hijos de las Nieves.

            - Commit: `${{ steps.meta.outputs.sha }}`
            - Version: `${{ steps.meta.outputs.version }}`
            - SHA256: `${{ steps.pack.outputs.sha256 }}`
            - Size: `${{ steps.pack.outputs.size }}` bytes

            Lock-step con el server SkyMP en produccion. Instalar via launcher
            o descomprimir manualmente sobre la raiz de `Skyrim Special Edition`.
          files: |
            SkyrimPlatform-*.zip
            skyrim-platform-latest.json
          fail_on_unmatched_files: true
